name: ci

# 배포용 exe 는 teaveloper 포털에서 빌드한다(앱 이름 통일성). 여기 CI 는 코드가
# 깨지지 않는지 검증만 한다 — vet/test + 윈도우 크로스컴파일 컴파일 체크.
# (아티팩트 업로드·릴리스 게시는 하지 않는다.)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build check (Windows, no CGO, no console window)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-H windowsgui -s -w" -o /tmp/teaveloper-runner.exe .
