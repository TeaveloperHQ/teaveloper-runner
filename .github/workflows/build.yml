name: build-windows-exe

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build Windows exe (no CGO, no console window)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-H windowsgui -s -w" -o dist/teaveloper-runner.exe .
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: teaveloper-runner
          path: dist/teaveloper-runner.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/teaveloper-runner.exe
