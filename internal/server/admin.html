<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teaveloper 관리</title>
<style>
  :root { --bd:#e4e4e7; --mut:#71717a; --bg:#fafafa; --acc:#2563eb; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; margin: 0; background: var(--bg); color: #18181b; }
  header { background: #fff; border-bottom: 1px solid var(--bd); padding: .8rem 1.2rem; display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
  header h1 { font-size: 1.05rem; margin: 0; }
  .dot { width:.7rem; height:.7rem; border-radius:50%; display:inline-block; margin-right:.35rem; vertical-align:middle; }
  .url { font-family: ui-monospace, monospace; font-size:.85rem; color: var(--mut); }
  button { font: inherit; border:1px solid var(--bd); background:#fff; border-radius:6px; padding:.35rem .7rem; cursor:pointer; }
  button:hover { background:#f4f4f5; }
  button.pri { background: var(--acc); color:#fff; border-color: var(--acc); }
  button.danger { color:#dc2626; border-color:#fecaca; }
  main { display:flex; min-height: calc(100vh - 56px); }
  nav { width: 220px; border-right:1px solid var(--bd); background:#fff; padding:.6rem; }
  nav .col { padding:.5rem .6rem; border-radius:6px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
  nav .col:hover { background:#f4f4f5; }
  nav .col.active { background:#eff6ff; color: var(--acc); }
  nav .col .badge { font-size:.7rem; color:var(--mut); }
  nav .col .preset { font-size:.65rem; color:#fff; background:#a1a1aa; border-radius:4px; padding:0 .3rem; margin-left:.3rem; }
  nav .col .preset.submissions{background:#2563eb;} nav .col .preset.public{background:#16a34a;} nav .col .preset.private{background:#6b7280;}
  section { flex:1; padding:1rem 1.2rem; overflow:auto; }
  .toolbar { display:flex; gap:.5rem; margin-bottom:.8rem; align-items:center; flex-wrap:wrap; }
  input[type=search]{ font:inherit; padding:.35rem .6rem; border:1px solid var(--bd); border-radius:6px; min-width:200px; }
  table { border-collapse: collapse; width:100%; background:#fff; font-size:.85rem; }
  th, td { border:1px solid var(--bd); padding:.4rem .55rem; text-align:left; vertical-align:top; max-width:340px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  th { background:#f4f4f5; position:sticky; top:0; }
  .empty { color:var(--mut); padding:2rem; text-align:center; }
  .muted { color: var(--mut); font-size:.85rem; }
</style>
</head>
<body>
<header>
  <h1>📋 Teaveloper 관리</h1>
  <span id="status"><span class="dot" style="background:#a1a1aa"></span>확인 중…</span>
  <span class="url" id="url"></span>
  <span style="flex:1"></span>
  <button id="open">공개 주소 열기</button>
  <button id="copy">주소 복사</button>
</header>
<main>
  <nav id="nav"><div class="muted" style="padding:.5rem">불러오는 중…</div></nav>
  <section>
    <div class="toolbar">
      <strong id="curName">컬렉션을 선택하세요</strong>
      <span style="flex:1"></span>
      <input type="search" id="search" placeholder="검색…" disabled>
      <button id="csv" disabled>CSV 내보내기</button>
      <button id="json" disabled>JSON 내보내기</button>
      <button id="delAll" class="danger" disabled>전체 삭제</button>
    </div>
    <div id="tableWrap"><div class="empty">왼쪽에서 컬렉션을 선택하면 결과가 표시됩니다.</div></div>
  </section>
</main>
<script>
const $ = s => document.querySelector(s);
let current = null, rows = [];

async function api(path, opts) {
  const r = await fetch('/_admin/api' + path, opts);
  if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error || r.status);
  return r.json();
}

const DOT = { '연결됨':'#22c55e', '연결 중':'#eab308', '끊김':'#ef4444', '토큰 무효':'#ef4444' };
async function loadStatus() {
  try {
    const s = await api('/status');
    $('#status').innerHTML = '<span class="dot" style="background:'+(DOT[s.state]||'#a1a1aa')+'"></span>'+s.state;
    $('#url').textContent = s.publicUrl || '';
    $('#open').onclick = () => s.publicUrl && window.open(s.publicUrl, '_blank');
    $('#copy').onclick = () => s.publicUrl && navigator.clipboard.writeText(s.publicUrl);
  } catch(e) {}
}

async function loadCollections() {
  const d = await api('/collections');
  const nav = $('#nav');
  if (!d.collections.length) { nav.innerHTML = '<div class="muted" style="padding:.5rem">선언된 컬렉션이 없습니다.<br>app/teaveloper.json 을 확인하세요.</div>'; return; }
  nav.innerHTML = '';
  d.collections.forEach(c => {
    const el = document.createElement('div');
    el.className = 'col' + (c.name===current?' active':'');
    el.innerHTML = '<span>'+c.name+'<span class="preset '+c.preset+'">'+c.preset+'</span></span><span class="badge">'+c.count+'</span>';
    el.onclick = () => selectCol(c.name);
    nav.appendChild(el);
  });
}

async function selectCol(name) {
  current = name;
  $('#curName').textContent = name;
  ['#search','#csv','#json','#delAll'].forEach(s => $(s).disabled = false);
  $('#csv').onclick = () => location.href = '/_admin/api/export/'+name+'?format=csv';
  $('#json').onclick = () => location.href = '/_admin/api/export/'+name+'?format=json';
  $('#delAll').onclick = async () => { if(confirm(name+' 의 모든 레코드를 삭제할까요?')){ await api('/records/'+name,{method:'DELETE'}); await selectCol(name); await loadCollections(); } };
  rows = await api('/records/'+name+'?limit=5000');
  render();
  loadCollections();
}

function render() {
  const q = $('#search').value.trim().toLowerCase();
  const data = q ? rows.filter(r => JSON.stringify(r).toLowerCase().includes(q)) : rows;
  const wrap = $('#tableWrap');
  if (!data.length) { wrap.innerHTML = '<div class="empty">레코드가 없습니다.</div>'; return; }
  const keys = ['id','createdAt','updatedAt'];
  data.forEach(r => Object.keys(r).forEach(k => keys.includes(k)||keys.push(k)));
  let h = '<table><thead><tr>' + keys.map(k=>'<th>'+esc(k)+'</th>').join('') + '<th></th></tr></thead><tbody>';
  data.forEach(r => {
    h += '<tr>' + keys.map(k=>'<td title="'+esc(cell(r[k]))+'">'+esc(cell(r[k],k))+'</td>').join('');
    h += '<td><button class="danger" data-id="'+esc(r.id)+'">삭제</button></td></tr>';
  });
  wrap.innerHTML = h + '</tbody></table>';
  wrap.querySelectorAll('button[data-id]').forEach(b => b.onclick = async () => {
    if(confirm('이 레코드를 삭제할까요?')){ await api('/records/'+current+'/'+b.dataset.id,{method:'DELETE'}); await selectCol(current); }
  });
}

function cell(v, k) {
  if (v == null) return '';
  if ((k==='createdAt'||k==='updatedAt') && typeof v==='number') return new Date(v).toLocaleString('ko-KR');
  return typeof v==='object' ? JSON.stringify(v) : String(v);
}
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

$('#search').addEventListener('input', render);
loadStatus(); loadCollections();
setInterval(loadStatus, 5000);
</script>
</body>
</html>
